---
layout: default
---
<p>{{ page.date }} - Written by {{ page.author }}</p>

{% if page.tags.size > 0 %}
  <p>Tags:
    {% for tag in page.tags %}
      <a href="/tags/{{ tag | slugify }}">{{ tag }}</a>{% unless forloop.last %},{% endunless %}
    {% endfor %}
  </p>
{% endif %}
<hr>

{{ content }}
